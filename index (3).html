<!DOCTYPE html><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Page</title>
<link rel="stylesheet" href="ordir.css">
</head>

<body>

<div class="checkout-container">

<div class="order-container">

<h2>Customer Information</h2>

<input type="text" placeholder="Full Name">
<input type="email" placeholder="Email Address">
<input type="text" placeholder="Phone Number">

<h2>Shipping Address</h2>

<input type="text" placeholder="Address">
<input type="text" placeholder="City">
<input type="text" placeholder="Postal Code">
<input type="text" placeholder="Country">

<h2>Payment Method</h2>

<label><input type="radio" name="payment"> Credit / Debit Card</label>
<label><input type="radio" name="payment"> PayPal</label>
<label><input type="radio" name="payment"> Cash on Delivery</label>

<button class="place-order">Place Order</button>

</div>


<div class="order-summary">

<h3>Your Order</h3>

<div class="product-box">

<img id="productImage" width="150">

<p><strong>Product:</strong> <span id="productName">Loading...</span></p>
<p><strong>Price:</strong> ₱<span id="productPrice">0</span></p>

</div>

</div>

</div>

<script>

const productName = localStorage.getItem("productName") || "N/A";
const productPrice = localStorage.getItem("productPrice") || "0";
const productImage = localStorage.getItem("productImage") || "";

document.getElementById("productName").innerText = productName;
document.getElementById("productPrice").innerText = productPrice;
document.getElementById("productImage").src = productImage;

</script>

</body>
</html>
